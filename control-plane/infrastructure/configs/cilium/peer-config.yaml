apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: vyos
spec:
  authSecretRef: vyos-bgp-auth
  timers:
    connectRetryTimeSeconds: 5
    holdTimeSeconds: 9
    keepAliveTimeSeconds: 3
  gracefulRestart:
    enabled: true
    restartTimeSeconds: 15
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: bgp