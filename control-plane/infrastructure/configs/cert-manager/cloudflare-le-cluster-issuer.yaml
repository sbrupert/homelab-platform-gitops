apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cloudflare-letsencrypt
spec:
  acme:
    email: srupert@sbrtech.xyz
    server: https://acme-staging-v02.api.letsencrypt.org/directory # Change once ready to go to prod.
    privateKeySecretRef:
      name: cloudflare-letsencrypt-account-key
    
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
