apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  timeout: 10m
  releaseName: external-dns
  targetNamespace: external-dns

  chart:
    spec:
      chart: external-dns
      version: "1.21.1"
      interval: 1h
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns

  driftDetection:
    mode: enabled

  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m

  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m

  values:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

    provider:
      name: rfc2136

    sources:
      - gateway-httproute
      - service

    domainFilters:
      - svc.int.sbrtech.xyz

    policy: sync
    registry: txt
    txtOwnerId: homelab-control-plane
    txtPrefix: external-dns-

    interval: 1m
    triggerLoopOnEvent: true
    
    logLevel: info
    logFormat: json

    env:
      - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
        valueFrom:
          secretKeyRef:
            name: external-dns-rfc2136
            key: tsig-secret

    extraArgs:
      rfc2136-host: 10.1.10.5
      rfc2136-port: 53
      rfc2136-zone: svc.int.sbrtech.xyz
      rfc2136-tsig-keyname: external-dns-control-plane
      rfc2136-tsig-secret-alg: hmac-sha256
      rfc2136-tsig-axfr:
      rfc2136-min-ttl: 60s
      service-type-filter:
        - LoadBalancer